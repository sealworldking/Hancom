<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>우리 반 배치도</title>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin: 0; font-family: sans-serif; text-align: center; background: #f4f4f4; overflow: hidden; }
  h1 { margin: 14px 0 0; font-size: 22px; }
  #addBtnRow { margin-top: 8px; }
  #divider {
    width: 100%;
    height: 2px;
    background: #333;
    margin: 12px 0;
  }

  #frontArea {
    width: 620px;
    margin: 8px auto 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #tv {
    width: 160px;
    height: 28px;
    background: #333;
    color: white;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    letter-spacing: 2px;
  }
  #teacherArea {
    width: 100%;
    display: flex;
    justify-content: flex-end;
    padding-right: 20px;
    margin-top: 6px;
  }
  #teacherArea span {
    background: #ffe58a;
    border: 2px solid #c9a227;
    border-radius: 6px;
    padding: 2px 10px;
    font-size: 12px;
  }

  #grid { width: 620px; margin: 10px auto 0; }
  .row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;   /* 가운데 복도 */
    margin-bottom: 8px;
  }
  .side { display: flex; gap: 10px; }
  .seat, .empty-seat {
    width: 90px;
    height: 68px;
  }
  .seat {
    background: white;
    border: 2px solid #333;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    cursor: pointer;
    position: relative;
    user-select: none;
  }
  .seat:hover { background: #e8f0ff; }
  .seat .id { font-size: 11px; color: #888; margin-bottom: 2px; }
  .seat .del {
    position: absolute;
    top: 1px;
    right: 5px;
    font-size: 13px;
    color: red;
    cursor: pointer;
  }
  .seat.vacant {
    background: #eee;
    border: 2px dashed #aaa;
    color: #aaa;
    cursor: default;
    font-size: 12px;
  }

  #doorArea {
    width: 620px;
    margin: 8px auto 0;
    text-align: right;
  }
  #doorArea span {
    background: #cce5ff;
    border: 2px solid #3d7bc9;
    border-radius: 6px;
    padding: 2px 10px;
    font-size: 12px;
  }
  #addBtn {
    font-size: 14px;
    padding: 6px 14px;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>우리 반 배치도</h1>
<div id="addBtnRow">
  <button id="addBtn">+ 학생 추가</button>
</div>

<div id="divider"></div>

<div id="frontArea">
  <div id="tv">TV</div>
  <div id="teacherArea"><span>강사님</span></div>
</div>
<div id="grid"></div>
<div id="doorArea"><span>출입문</span></div>

<script>
const BASE = 'http://192.168.10.28:5000/hancom/한유진/users'
const HEADERS = { 'Content-Type': 'application/json', 'Authorization': 'HANCOM' }

async function loadStudents() {
  const res = await fetch(BASE, { headers: HEADERS })
  const students = await res.json()
  render(students)
}

// 실제 앉은 자리 그대로 고정 배치 (id 기준)
// null = 빈자리 / 'none' = 자리 자체가 없음(맨 앞줄 오른쪽 맨끝) / 숫자 = 그 id인 학생이 앉음
const SEAT_MAP = [
  { left: [null, 19, 20], right: [3, 4, 'none'] },    // 1줄: 빈자리 한유진 한윤지 | 김정아 김정현
  { left: [11, 2, 17],    right: [5, 15, 18] },       // 2줄: 이도연 강하영 정유진 | 김해냄 정기준 표후동
  { left: [16, 9, 10],    right: [null, 14, 12] },    // 3줄: 정선민 양하은 유민성 | 빈자리 전욱진 이현우
  { left: [null, 7, 6],   right: [1, 13, 8] },        // 4줄: 빈자리 박진 김효인 | 강성원 임소정 안치호
]

function render(students) {
  const grid = document.getElementById('grid')
  grid.innerHTML = ''

  const byId = new Map(students.map(s => [s.id, s]))

  SEAT_MAP.forEach(rowDef => {
    const rowDiv = document.createElement('div')
    rowDiv.className = 'row'

    const leftDiv = document.createElement('div')
    leftDiv.className = 'side'
    const rightDiv = document.createElement('div')
    rightDiv.className = 'side'

    rowDef.left.forEach(id => leftDiv.appendChild(makeCell(id, byId)))
    rowDef.right.forEach(id => rightDiv.appendChild(makeCell(id, byId)))

    rowDiv.appendChild(leftDiv)
    rowDiv.appendChild(rightDiv)
    grid.appendChild(rowDiv)
  })

  // SEAT_MAP에 없는 새로 추가된 학생은 맨 아래 별도 줄에 표시
  const mappedIds = new Set(SEAT_MAP.flatMap(r => [...r.left, ...r.right]))
  const extras = students.filter(s => !mappedIds.has(s.id))
  if (extras.length) {
    const rowDiv = document.createElement('div')
    rowDiv.className = 'row'
    const side = document.createElement('div')
    side.className = 'side'
    extras.forEach(s => side.appendChild(makeSeat(s)))
    rowDiv.appendChild(side)
    grid.appendChild(rowDiv)
  }
}

function makeCell(id, byId) {
  if (id === 'none') {
    const empty = document.createElement('div')
    empty.className = 'empty-seat'
    return empty
  }
  if (id === null) {
    const vacant = document.createElement('div')
    vacant.className = 'seat vacant'
    vacant.textContent = '빈자리'
    return vacant
  }
  const s = byId.get(id)
  if (!s) {
    const vacant = document.createElement('div')
    vacant.className = 'seat vacant'
    vacant.textContent = '빈자리'
    return vacant
  }
  return makeSeat(s)
}

function makeSeat(s) {
  const seat = document.createElement('div')
  seat.className = 'seat'

  const idLine = document.createElement('div')
  idLine.className = 'id'
  idLine.textContent = `ID: ${s.id}`
  seat.appendChild(idLine)

  const nameLine = document.createElement('div')
  nameLine.textContent = s.name
  seat.appendChild(nameLine)

  // 이름 클릭 → 수정(PUT)
  seat.addEventListener('click', () => editStudent(s))

  // 삭제 버튼
  const del = document.createElement('span')
  del.className = 'del'
  del.textContent = '✕'
  del.addEventListener('click', (e) => {
    e.stopPropagation()   // 삭제 누를 때 수정 클릭 안 되게
    deleteStudent(s.id)
  })
  seat.appendChild(del)

  return seat
}

async function editStudent(s) {
  const newName = prompt('새 이름 입력', s.name)
  if (!newName || newName === s.name) return
  await fetch(`${BASE}/${s.id}`, {
    method: 'PUT',
    headers: HEADERS,
    body: JSON.stringify({ name: newName })
  })
  loadStudents()
}

async function deleteStudent(id) {
  if (!confirm('삭제할까요?')) return
  await fetch(`${BASE}/${id}`, {
    method: 'DELETE',
    headers: HEADERS
  })
  loadStudents()
}

document.getElementById('addBtn').addEventListener('click', async () => {
  const name = prompt('추가할 학생 이름')
  if (!name) return
  await fetch(BASE, {
    method: 'POST',
    headers: HEADERS,
    body: JSON.stringify({ name })
  })
  loadStudents()
})

loadStudents()
</script>

</body>
</html>
