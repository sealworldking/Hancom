<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bezier Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-blue-400:   oklch(0.554 0.214 280);
      --color-cobalt-400: oklch(0.643 0.150 248);
      --color-red-400:    oklch(0.634 0.177 20);
      --color-grey-50:    oklch(0.988 0 286);
      --color-grey-100:   oklch(0.976 0.001 286);
      --color-grey-200:   oklch(0.952 0.001 286);
      --color-grey-400:   oklch(0.855 0.003 286);
      --color-grey-900:   oklch(0.232 0.006 286);
      --color-grey-800:   oklch(0.283 0.007 286);
      --color-grey-700:   oklch(0.354 0.007 286);
      --color-black-85:   oklch(0 0 0 / 0.85);
      --color-white-90:   oklch(1 0 0 / 0.90);
      --color-black-8:    oklch(0 0 0 / 0.08);

      --bg-surface:       var(--color-grey-50);
      --bg-card:          var(--color-grey-50);
      --bg-display:       var(--color-grey-100);
      --bg-button:        var(--color-grey-200);
      --text-primary:     var(--color-black-85);
      --text-secondary:   oklch(0 0 0 / 0.60);
      --border-light:     var(--color-black-8);
    }

    [data-theme="dark"] {
      --bg-surface:       var(--color-grey-900);
      --bg-card:          var(--color-grey-800);
      --bg-display:       var(--color-grey-700);
      --bg-button:        var(--color-grey-700);
      --text-primary:     var(--color-white-90);
      --text-secondary:   oklch(1 0 0 / 0.60);
      --border-light:     oklch(1 0 0 / 0.12);
    }

    html {
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
    }

    body {
      width: 100%;
      min-height: 100vh;
      background-color: var(--bg-surface);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 16px;
      transition: background-color 150ms cubic-bezier(0.3,0,0,1);
    }

    .calc-container {
      width: 100%;
      max-width: 360px;
      background-color: var(--bg-card);
      border-radius: 24px;
      padding: 20px;
      box-shadow:
        0 1px 2px 0 oklch(0 0 0 / 0.08),
        0 2px 4px 0 oklch(0 0 0 / 0.06),
        0 4px 12px 0 oklch(0 0 0 / 0.10);
      transition: background-color 150ms cubic-bezier(0.3,0,0,1), box-shadow 150ms cubic-bezier(0.3,0,0,1);
    }

    .display {
      background-color: var(--bg-display);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      text-align: right;
      transition: background-color 150ms cubic-bezier(0.3,0,0,1);
    }

    .expression {
      font-size: 0.875rem;
      font-weight: 400;
      color: var(--text-secondary);
      min-height: 20px;
      margin-bottom: 8px;
      transition: color 150ms cubic-bezier(0.3,0,0,1);
    }

    .number-display {
      font-size: 3rem;
      font-weight: 700;
      color: var(--text-primary);
      word-wrap: break-word;
      word-break: break-all;
      transition: color 150ms cubic-bezier(0.3,0,0,1);
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 1.1rem;
      font-weight: 400;
      cursor: pointer;
      transition:
        background-color 150ms cubic-bezier(0.3,0,0,1),
        color 150ms cubic-bezier(0.3,0,0,1),
        transform 150ms cubic-bezier(0.3,0,0,1),
        box-shadow 150ms cubic-bezier(0.3,0,0,1);
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button:active {
      transform: scale(0.96);
    }

    /* Number buttons */
    .btn-number {
      background-color: var(--bg-button);
      color: var(--text-primary);
    }

    .btn-number:hover {
      background-color: oklch(0 0 0 / 0.05);
    }

    [data-theme="dark"] .btn-number:hover {
      background-color: oklch(1 0 0 / 0.08);
    }

    /* Operator buttons (÷ × - +) */
    .btn-operator {
      background-color: var(--color-cobalt-400);
      color: white;
      font-weight: 700;
    }

    .btn-operator:hover {
      box-shadow:
        0 0 0 4px oklch(0.643 0.150 248 / 0.2);
    }

    /* Equals button */
    .btn-equals {
      background-color: var(--color-blue-400);
      color: white;
      font-weight: 700;
      grid-column: 1;
    }

    .btn-equals:hover {
      box-shadow:
        0 0 0 4px oklch(0.554 0.214 280 / 0.2);
    }

    /* AC button */
    .btn-clear {
      background-color: var(--color-red-400);
      color: white;
      font-weight: 700;
    }

    .btn-clear:hover {
      box-shadow:
        0 0 0 4px oklch(0.634 0.177 20 / 0.2);
    }

    /* ± and % buttons */
    .btn-function {
      background-color: var(--bg-button);
      color: var(--text-primary);
    }

    .btn-function:hover {
      background-color: oklch(0 0 0 / 0.05);
    }

    [data-theme="dark"] .btn-function:hover {
      background-color: oklch(1 0 0 / 0.08);
    }

    /* Zero button spans 2 columns */
    .btn-zero {
      grid-column: span 2;
    }

    .theme-toggle {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 16px;
    }

    .theme-btn {
      width: 40px;
      height: 40px;
      padding: 0;
      background-color: transparent;
      border: 2px solid var(--text-primary);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 1.25rem;
      cursor: pointer;
      transition:
        border-color 150ms cubic-bezier(0.3,0,0,1),
        color 150ms cubic-bezier(0.3,0,0,1),
        background-color 150ms cubic-bezier(0.3,0,0,1);
    }

    .theme-btn:hover {
      background-color: var(--bg-button);
    }

    .theme-btn.active {
      background-color: var(--text-primary);
      color: var(--bg-card);
    }
  </style>
</head>
<body>
  <div class="calc-container">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="number-display" id="display">0</div>
    </div>

    <div class="button-grid">
      <button class="btn-clear" data-action="clear">AC</button>
      <button class="btn-function" data-action="toggle-sign">±</button>
      <button class="btn-function" data-action="percent">%</button>
      <button class="btn-operator" data-action="operator" data-operator="/">÷</button>

      <button class="btn-number" data-action="number" data-number="7">7</button>
      <button class="btn-number" data-action="number" data-number="8">8</button>
      <button class="btn-number" data-action="number" data-number="9">9</button>
      <button class="btn-operator" data-action="operator" data-operator="*">×</button>

      <button class="btn-number" data-action="number" data-number="4">4</button>
      <button class="btn-number" data-action="number" data-number="5">5</button>
      <button class="btn-number" data-action="number" data-number="6">6</button>
      <button class="btn-operator" data-action="operator" data-operator="-">−</button>

      <button class="btn-number" data-action="number" data-number="1">1</button>
      <button class="btn-number" data-action="number" data-number="2">2</button>
      <button class="btn-number" data-action="number" data-number="3">3</button>
      <button class="btn-operator" data-action="operator" data-operator="+">+</button>

      <button class="btn-number btn-zero" data-action="number" data-number="0">0</button>
      <button class="btn-number" data-action="decimal">.</button>
      <button class="btn-equals" data-action="equals">=</button>
    </div>

    <div class="theme-toggle">
      <button class="theme-btn active" id="theme-light" data-theme="light">☀</button>
      <button class="theme-btn" id="theme-dark" data-theme="dark">🌙</button>
    </div>
  </div>

  <script>
    const display = document.getElementById('display');
    const expression = document.getElementById('expression');
    const themeButtons = document.querySelectorAll('.theme-btn');

    let state = {
      operand1: null,
      operator: null,
      operand2: null,
      currentInput: '0',
      hasDecimal: false,
    };

    function updateDisplay() {
      display.textContent = state.currentInput;

      if (state.operator && state.operand1 !== null) {
        expression.textContent = `${state.operand1} ${state.operator}`;
      } else if (state.operand1 !== null) {
        expression.textContent = state.operand1;
      } else {
        expression.textContent = '';
      }
    }

    function handleNumber(num) {
      if (state.currentInput === '0' && num !== '0') {
        state.currentInput = String(num);
      } else if (state.currentInput !== '0') {
        state.currentInput += String(num);
      }
      updateDisplay();
    }

    function handleDecimal() {
      if (!state.hasDecimal) {
        state.currentInput += '.';
        state.hasDecimal = true;
      }
      updateDisplay();
    }

    function handleOperator(op) {
      const current = parseFloat(state.currentInput);

      if (state.operand1 === null) {
        state.operand1 = current;
      } else if (state.operator) {
        const result = compute(state.operand1, parseFloat(state.currentInput), state.operator);
        state.operand1 = result;
        state.currentInput = String(result);
      }

      state.operator = op;
      state.hasDecimal = false;
      updateDisplay();
    }

    function compute(a, b, op) {
      switch (op) {
        case '+': return a + b;
        case '-': return a - b;
        case '*': return a * b;
        case '/': return b !== 0 ? a / b : 0;
        default: return b;
      }
    }

    function handleEquals() {
      if (state.operand1 !== null && state.operator) {
        const result = compute(state.operand1, parseFloat(state.currentInput), state.operator);
        state.currentInput = String(result);
        state.operand1 = null;
        state.operator = null;
        state.hasDecimal = String(result).includes('.');
        updateDisplay();
      }
    }

    function handleClear() {
      state = {
        operand1: null,
        operator: null,
        operand2: null,
        currentInput: '0',
        hasDecimal: false,
      };
      updateDisplay();
    }

    function handleToggleSign() {
      const current = parseFloat(state.currentInput);
      state.currentInput = String(current * -1);
      updateDisplay();
    }

    function handlePercent() {
      const current = parseFloat(state.currentInput);
      state.currentInput = String(current / 100);
      state.hasDecimal = true;
      updateDisplay();
    }

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      themeButtons.forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('data-theme') === theme);
      });
    }

    document.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const action = btn.getAttribute('data-action');

        if (action === 'number') {
          handleNumber(btn.getAttribute('data-number'));
        } else if (action === 'decimal') {
          handleDecimal();
        } else if (action === 'operator') {
          handleOperator(btn.getAttribute('data-operator'));
        } else if (action === 'equals') {
          handleEquals();
        } else if (action === 'clear') {
          handleClear();
        } else if (action === 'toggle-sign') {
          handleToggleSign();
        } else if (action === 'percent') {
          handlePercent();
        }
      });
    });

    themeButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        setTheme(btn.getAttribute('data-theme'));
      });
    });

    updateDisplay();
  </script>
</body>
</html>
