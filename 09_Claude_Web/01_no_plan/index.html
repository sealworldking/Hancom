<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>계산기</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .calc {
    width: 320px;
    background: #16213e;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  }
  .display {
    background: #0f172a;
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 16px;
    text-align: right;
    min-height: 90px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }
  .history {
    color: #64748b;
    font-size: 14px;
    min-height: 20px;
    word-break: break-all;
  }
  .result {
    color: #f1f5f9;
    font-size: 40px;
    font-weight: 600;
    word-break: break-all;
  }
  .keys {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  button {
    border: none;
    border-radius: 10px;
    padding: 18px 0;
    font-size: 20px;
    font-weight: 500;
    cursor: pointer;
    background: #233554;
    color: #e2e8f0;
    transition: filter 0.1s;
  }
  button:hover { filter: brightness(1.2); }
  button:active { filter: brightness(0.9); }
  .op { background: #0ea5e9; color: #fff; }
  .fn { background: #475569; }
  .equals { background: #f59e0b; color: #fff; }
  .span2 { grid-column: span 2; }
</style>
</head>
<body>
  <div class="calc">
    <div class="display">
      <div class="history" id="history"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="keys">
      <button class="fn" data-action="clear">AC</button>
      <button class="fn" data-action="sign">+/-</button>
      <button class="fn" data-action="percent">%</button>
      <button class="op" data-op="/">/</button>

      <button data-num="7">7</button>
      <button data-num="8">8</button>
      <button data-num="9">9</button>
      <button class="op" data-op="*">&times;</button>

      <button data-num="4">4</button>
      <button data-num="5">5</button>
      <button data-num="6">6</button>
      <button class="op" data-op="-">&minus;</button>

      <button data-num="1">1</button>
      <button data-num="2">2</button>
      <button data-num="3">3</button>
      <button class="op" data-op="+">+</button>

      <button class="span2" data-num="0">0</button>
      <button data-action="dot">.</button>
      <button class="equals" data-action="equals">=</button>
    </div>
  </div>

<script>
  const resultEl = document.getElementById("result");
  const historyEl = document.getElementById("history");

  let current = "0";
  let previous = null;
  let operator = null;
  let resetNext = false;

  function render() {
    resultEl.textContent = current;
    historyEl.textContent =
      previous !== null && operator
        ? previous + " " + opSymbol(operator)
        : "";
  }

  function opSymbol(op) {
    return { "/": "/", "*": "×", "-": "−", "+": "+" }[op] || op;
  }

  function inputNum(n) {
    if (resetNext) { current = "0"; resetNext = false; }
    current = current === "0" ? n : current + n;
    render();
  }

  function inputDot() {
    if (resetNext) { current = "0"; resetNext = false; }
    if (!current.includes(".")) current += ".";
    render();
  }

  function clearAll() {
    current = "0";
    previous = null;
    operator = null;
    resetNext = false;
    render();
  }

  function sign() {
    current = current.startsWith("-") ? current.slice(1) : (current === "0" ? "0" : "-" + current);
    render();
  }

  function percent() {
    current = String(parseFloat(current) / 100);
    render();
  }

  function compute(a, b, op) {
    switch (op) {
      case "+": return a + b;
      case "-": return a - b;
      case "*": return a * b;
      case "/": return b === 0 ? NaN : a / b;
    }
  }

  function setOp(op) {
    if (operator && !resetNext) {
      const r = compute(parseFloat(previous), parseFloat(current), operator);
      current = format(r);
      previous = current;
    } else {
      previous = current;
    }
    operator = op;
    resetNext = true;
    render();
  }

  function equals() {
    if (!operator || previous === null) return;
    const r = compute(parseFloat(previous), parseFloat(current), operator);
    current = format(r);
    previous = null;
    operator = null;
    resetNext = true;
    render();
  }

  function format(n) {
    if (!isFinite(n)) return "오류";
    return String(Math.round((n + Number.EPSILON) * 1e10) / 1e10);
  }

  document.querySelector(".keys").addEventListener("click", (e) => {
    const b = e.target.closest("button");
    if (!b) return;
    if (b.dataset.num !== undefined) inputNum(b.dataset.num);
    else if (b.dataset.op) setOp(b.dataset.op);
    else switch (b.dataset.action) {
      case "clear": clearAll(); break;
      case "sign": sign(); break;
      case "percent": percent(); break;
      case "dot": inputDot(); break;
      case "equals": equals(); break;
    }
  });

  window.addEventListener("keydown", (e) => {
    const k = e.key;
    if (k >= "0" && k <= "9") inputNum(k);
    else if (k === ".") inputDot();
    else if (["+", "-", "*", "/"].includes(k)) setOp(k);
    else if (k === "Enter" || k === "=") { e.preventDefault(); equals(); }
    else if (k === "Escape") clearAll();
    else if (k === "Backspace") {
      current = current.length > 1 ? current.slice(0, -1) : "0";
      render();
    }
  });

  render();
</script>
</body>
</html>
