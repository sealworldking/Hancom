<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>번호 목록</title>
    </head>
    <body>
        <ol type="I">
            <li>일어나기</li>
            <li>세수하기</li>
            <li>아침 먹기</li>
        </ol>
    </body>
</html>

<!--
추가로 알아낸 것) ol type="" 과 같은 코드를 작성하면 목록의 번호 스타일을 변경할 수 있다.
예를 들어, `type="I"`로 설정하면 로마자 대문자로 표시된다.
-->
