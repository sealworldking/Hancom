<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>줄 및 선</title>
    </head>
    <body>
        <p>
            첫 번째 줄<hr>
            <br>
            두 번째 줄<hr>
        </p>
    </body>
</html>

<!-- <br>은 줄바꿈을 하는 태그이다. 닫는 태그가 없는 빈 요소이다.
<hr>은 수평선을 그리는 태그이다. 닫는 태그가 없는 빈 요소이다. -->
