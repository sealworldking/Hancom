<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>글자 꾸미기</title>
    </head>
    <body>
        <h1>글자 꾸미기</h1>
        <p><em>기울임 강조</em></p>
        <p><mark>형광펜 입니다.</mark></p>
        <p><small>작게 쓰는 글씨</small></p>
        <blockquote>남의 말을 인용합니다.</blockquote>
        <p>H<sub>2</sub>0</p>
        <p>X<sup>2</sup></p>
    </body>
</html>

<!-- 글을 쓸 때 유용한 몇 가지 수정 기능들이다. -->
