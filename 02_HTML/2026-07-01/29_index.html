<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>영상 넣기</title>
    </head>
    <body>
        <h1>영상 넣기</h1>
        <video controls width="400" height="300" src="./video.mp4" autoplay muted loop></video>
    </body>
</html>

<!-- 
추가 공부한 것: autoplay="true" 속성을 넣으면 동영상을 자동 재생 시킬 수 있다.
-> 만약 동영상이 소리가 없는 동영상인 경우, muted 속성을 넣어줘야  정상적으로 자동재생된다.
또한, loop 속성을 넣으면 동영상이 끝나면 다시 처음부터 재생된다.
-->
