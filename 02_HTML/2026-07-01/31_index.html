<!-- 
! 후 Enter 하면 자동으로 기본 뼈대가 만들어진다.
1. >: 안에 넣기(지식) ul>li: ul 안에 li
2. *N: N번 반복 li*3=li 3ro
3. 이름: class 붙이기
4. #이름: id 붙이기
5. {글자}: 태그 안의 내용
6. [속성]: 속성 넣기

추가로 해본 것: a[href=# target=_blank title=링크]를 하여
    - 여러 속성을 한번에 넣을 수 있다.
-->
