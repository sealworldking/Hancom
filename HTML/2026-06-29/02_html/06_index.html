<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>제목과 문단</title>
    </head>
    <body>
        <!-- 제목 크기 조정 -->
        <h1>가장 큰 제목</h1>
        <h2>가장 큰 제목</h2>
        <h3>가장 큰 제목</h3>
        <h4>가장 큰 제목</h4>
        <h5>가장 큰 제목</h5>
        <h6>가장 큰 제목</h6>
        <!-- 문단(글 한 덩어리) -->
        <p>저는 HTML을 배우는 학생입니다</p>
    </body>
</html>

<!-- h다음에 오는 숫자는 6이 최대이다.(숫자가 커질수록 크기 작아짐) -->
