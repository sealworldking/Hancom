<!DOCTYPE html>     <!-- 이건 HTML 문서야 라고 알려주기 -->
<html lang="ko">    <!-- 문서 시작, 한국어 페이지 -->
    <head>          <!-- 화면에는 안 보이는 칸 -->
        <meta charset="UTF-8">  <!-- 브라우저 탭에 뜨는 이름 -->
        <title>     <!-- 문서 시작, 한국어 -->
            태그+뼈대
        </title>
    </head>
    <body>          <!-- 화면에 보이는 칸 -->   
        <h1>
            태그와 뼈대를 공부하자!
        </h1>
    </body>

</html>

<!-- - 요소(element) = 여는 태그 + 내용 + 닫는 태그
- 태그 이름은 대소문자 안 가림 (H1 = h1) -->
