<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>이미지 넣기</title>
    </head>
    <body>
        <!-- img 태그는 닫는 태그가 없다. -->
        <!-- 닫는 태그 없는 빈 요소라 />로 끝맺는다. -->
        <!-- src = 사진 주소, alt = 사진이 안 뜰 때 대신 보일 글자 입력 -->
        <img src="Profile.png" alt="사진 오류!" width="300" height="200"/>
        <!-- src는 필수지만, alt는 필수가 아니다. -->
    </body>
</html>
