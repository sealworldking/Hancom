<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>HTML 접기!!</title>
    </head>
    <body>
        <h1>접기</h1>
        <details>
            <summary>
                정답 보기
            </summary>
            <p>
                정답은 눌러야 보입니다.
            </p>
            <details>
                <summary>
                    정답 안의 정답
                </summary>
                <p>
                    정답 안의 정답입니다.
                </p>
            </details>
        </details>
    </body>
</html>

<!-- 
추가적으로 공부한 것:
<details>
    <summary>정답 보기</summary>
    <p>정답입니다</p>
    
    <details>
        <summary>정답 안의 정답</summary>
        <p>정답 안의 정답입니다.</p>
    </details>
</details>
HTML 태그는 재귀적으로 중첩 가능하다고 알고 있어, 접기도 중첩으로 시도했다.
    - 그 결과, 가능하다는 것을 알게 되었다.

그러나, 중첩될수록 들여쓰기를 하고 싶었는데, 이것은 CSS의 영역이라는 것을 깨달았다.
-->
