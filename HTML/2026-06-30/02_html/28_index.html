<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>시멘틱 구조</title>
    </head>
    <body>
        <header>
            <h1>시멘틱 구조</h1>
            <nav>홈 | 소개 | 연락처</nav>
        </header>
        <main>
            <section>
                <article>
                    첫 번째 글 내용
                </article>
            </section>
        </main>
        <aside>
            곁다리 정보(사이드바)
        </aside>
        <footer>
            2026 내 사이트
        </footer>
    </body>
</html>

<!-- 
div는 뜻 없는 빈 상자
시멘틱 태그는 이름만 봐도 무슨 구역인지 드러남
핵심: header, nav, main, section, article, aside, footer

추가로 학습한 것:
시맨틱 태그별 의미
<header>
페이지나 섹션의 상단 영역. 보통 제목, 로고, 네비게이션 메뉴를 담는다.
<nav>
사이트 내 다른 페이지로 이동하는 링크들을 모아놓은 네비게이션 메뉴 영역.
<main>
문서의 핵심 콘텐츠 영역. 한 페이지에 하나만 써야 하며, 헤더/푸터/사이드바처럼 반복되는 요소는 포함하지 않는다.
<section>
주제별로 구분되는 콘텐츠 묶음. 보통 안에 제목(h1~h6)을 포함해서 "이 구역은 이런 주제다"를 나타낸다.
<article>
독립적으로 떼어내도 의미가 통하는 콘텐츠. 블로그 글, 뉴스 기사, 댓글 하나 등이 해당된다. RSS 피드로 따로 배포해도 말이 되는 단위라고 생각하면 된다.
<aside>
본문과 직접적인 관련은 없지만 부가적으로 곁들이는 정보. 사이드바, 광고, 관련 링크 모음 등.
<footer>
페이지나 섹션의 하단 영역. 저작권 정보, 연락처, 사이트맵 링크 등을 담는다.
-->
