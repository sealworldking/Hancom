<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>Class</title>
    </head>
    <body>
        <h1>Class</h1>
        <p class="text1">안녕 나는 오늘 점심을 많이 먹을거야!</p>
        <p class="text2 text3 text4 text5">음 뭐 먹을까?</p>
    </body>
</html>

<!-- 
클래스는 여러 개가 나눠서 쓰는 이름표이다.
<p class="클래스 이름">내용</p> 와 같이 쓴다.
클래스 이름이 동일한 경우, 나중에 css로 같이 꾸밀 수 있다.
추가로 알아낸 것: 한 요소가 여러 개의 클래스를 가질 수 있다.
-->
