<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>시간표</title>
    </head>
    <body>
        <table border="1">
            <caption>시간표</caption>
            <tr>
                <th>요일</th>
                <th>과목</th>
                <th>시간</th>
            </tr>
            <tr>
                <td>월</td>
                <td>HTML</td>
                <td>7H</td>
            </tr>
            <tr>
                <td>화</td>
                <td>HTML</td>
                <td>7H</td>
            </tr>
        </table>
    </body>
</html>

<!--
<tr>은 가로 행을 나타낸다. 갈은 tr 헤더 안에 있는 내용들은 같은 가로줄에 들어간다.
<th>는 표의 제목을 나타낸다. 굵은 글씨로 표시된다. 주로 1행에 사용한다.
<td>는 표의 일반적인 내용을 나타낸다. 아무런 효과도 없다.

추가로 알아낸 것) 표 설정 시, <caption>을 사용하면 표의 제목을 넣어주는 것이 가능하다.
-->
