<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>폼 그리고 입력</title>
    </head>
    <body>
        <caption>사용자 정보 입력</caption>
        <form>
            <label>이름: <input type="text" placeholder="이름 입력"> </label>
            <br>
            <hr>
            <label>목표: <input type="number" placeholder="HTML 능력 목표치 1 ~ 10"> </label>
            <br>
            <hr>
            <label>관심 언어 (중복 선택):</label>
            <br>
            <label><input type="checkbox">Python</label>
            <br>
            <label><input type="checkbox">JavaScript</label>
            <br>
            <label><input type="checkbox">HTML/CSS</label>
            <br>
            <hr>
            <button type="submit">
                보내기
            </button>
        </form>
    </body>
</html>

<!-- 
<label> 로 넣을 내용에 대한 설명을 한 다음, <input type~ 을 이용하여 입력창을 만들 수 있다.
추가적으로 알아낸 것: 태그는 굉장히 다양하다. 그 중에서도 폼 림에 빠질 수 없는 것이 바로 체크박스이다.
    -type를 checkbox 로 설정하면 체크박스를 만들 수 있다.
-->
